<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗺️ 南塘实景地图编辑器</title>
<style>
:root {
  --bg: #f5f0e8; --card: #fffdf9; --text: #3d3629; --muted: #9b9078;
  --accent: #c88740; --green: #5d9442; --red: #b84c38;
  --border: #e5ddce; --dark: #4a3828;
  --font: system-ui, -apple-system, 'Segoe UI', 'Noto Sans SC', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); color:var(--text); background:var(--bg); display:flex; flex-direction:column; height:100vh; overflow:hidden; }

/* ── Top Tab Bar ── */
#tabBar {
  display:flex; align-items:center; gap:4px; padding:8px 14px 0;
  background:var(--bg); flex-shrink:0;
}
.tab-card {
  padding:10px 20px; border:1.5px solid var(--border); border-bottom:none;
  background:#d5c4a8; cursor:pointer; font-size:.85rem; font-weight:600;
  font-family:var(--font); border-radius:8px 8px 0 0; color:#5a4a38;
  transition:.12s; white-space:nowrap;
}
.tab-card:hover { background:#e0d0b8; }
.tab-card.active { background:var(--card); color:var(--accent); border-color:var(--dark); }

/* ── Sub-bar (floor selector, tool buttons) ── */
#subBar {
  display:flex; align-items:center; gap:8px; padding:6px 14px;
  background:var(--card); border-bottom:1.5px solid var(--dark); flex-shrink:0;
}
#subBar .label { font-size:.75rem; color:var(--muted); margin-right:4px; }
.floor-btn {
  padding:4px 12px; border:1.5px solid var(--border); border-radius:6px;
  cursor:pointer; font-size:.75rem; font-family:var(--font);
  background:var(--card); color:var(--text); transition:.12s; font-weight:500;
}
.floor-btn:hover { border-color:var(--accent); }
.floor-btn.active { background:var(--accent); color:#fff; border-color:#8b5a1e; }
#subBar .sep { width:1.5px; height:18px; background:var(--border); margin:0 4px; }

/* ── Main Layout ── */
#main { display:flex; flex:1; overflow:hidden; }

/* ── Left panel: layers ── */
#leftPanel {
  width:200px; flex-shrink:0; background:var(--card); border-right:1.5px solid var(--dark);
  padding:10px; overflow-y:auto; display:flex; flex-direction:column; gap:6px;
}
#leftPanel h3 { font-size:.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.layer-item {
  display:flex; align-items:center; gap:6px; padding:4px 6px;
  font-size:.78rem; border-radius:4px; cursor:pointer;
}
.layer-item:hover { background:#f5efe4; }
.layer-item.sel { background:#fff8f0; border:1px solid var(--accent); }
.layer-item input[type="checkbox"] { cursor:pointer; }
.layer-item .layer-name { flex:1; }
.layer-item .del-btn { color:var(--red); cursor:pointer; font-size:.7rem; visibility:hidden; }
.layer-item:hover .del-btn { visibility:visible; }
#leftPanel .actions { display:flex; gap:4px; margin-top:6px; }
#leftPanel .actions button { flex:1; }

/* ── Center: canvas ── */
#canvasWrap { flex:1; position:relative; overflow:hidden; background:#e8e0d0; }
canvas { display:block; }

/* ── Right: properties ── */
#rightPanel {
  width:200px; flex-shrink:0; background:var(--card); border-left:1.5px solid var(--dark);
  padding:10px; overflow-y:auto; font-size:.78rem;
}
#rightPanel h3 { font-size:.78rem; color:var(--muted); margin-bottom:8px; }
#rightPanel label { display:block; margin:6px 0 2px; font-size:.7rem; color:var(--muted); }
#rightPanel input, #rightPanel select {
  width:100%; padding:4px 6px; border:1.5px solid var(--border); border-radius:4px;
  font-size:.78rem; font-family:var(--font); background:#faf7f0;
}
#rightPanel input:focus, #rightPanel select:focus { outline:none; border-color:var(--accent); }
#rightPanel .empty { color:var(--muted); font-size:.72rem; text-align:center; padding:20px 0; }

/* ── Buttons ── */
.btn {
  padding:5px 10px; border:1.5px solid var(--border); border-radius:6px;
  cursor:pointer; font-size:.75rem; font-family:var(--font);
  background:var(--card); color:var(--text); transition:.12s; font-weight:500;
}
.btn:hover { background:#f5efe4; border-color:var(--accent); }
.btn.pri { background:var(--green); color:#fff; border-color:#3d5a1e; }
.btn.warn { background:var(--red); color:#fff; border-color:#7a2a1a; }

/* ── Toast ── */
#toast {
  position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
  background:var(--dark); color:#fff; padding:8px 20px; border-radius:20px;
  font-size:.8rem; z-index:100; pointer-events:none;
  opacity:0; transition:opacity .2s;
}
#toast.show { opacity:1; }
</style>
</head>
<body>

<!-- ── Tab Bar ── -->
<div id="tabBar">
  <div class="tab-card active" data-tab="courtyard">🏡 合作社大院</div>
  <div class="tab-card" data-tab="sushe">🏠 素社</div>
</div>

<!-- ── Sub Bar ── -->
<div id="subBar">
  <span class="label">楼层：</span>
  <div id="floorBtns"></div>
  <span class="sep"></span>
  <button class="btn" id="addRectBtn">⬜ 矩形</button>
  <button class="btn" id="addLineBtn">📏 线段</button>
  <button class="btn" id="addEmojiBtn">😀 图标</button>
  <button class="btn" id="addTextBtn">📝 文字</button>
  <span class="sep"></span>
  <button class="btn pri" id="saveBtn">💾 保存</button>
  <button class="btn" id="exportBtn">📋 导出</button>
  <button class="btn" id="importBtn">📥 导入</button>
  <input type="file" id="importFile" accept=".json" style="display:none">
</div>

<!-- ── Main ── -->
<div id="main">
  <!-- Left: Layers -->
  <div id="leftPanel">
    <h3>📋 图层</h3>
    <div id="layerList"></div>
    <div class="actions">
      <button class="btn" id="addLayerBtn">+ 图层</button>
    </div>
  </div>

  <!-- Center: Canvas -->
  <div id="canvasWrap">
    <canvas id="c"></canvas>
    <div id="propsPanel" style="display:none; position:absolute; right:10px; top:10px; background:var(--card); border:1.5px solid var(--dark); border-radius:8px; padding:10px; min-width:170px; font-size:.75rem; box-shadow:0 4px 16px rgba(0,0,0,.15); z-index:10;"></div>
  </div>

  <!-- Right: Properties -->
  <div id="rightPanel">
    <h3>📐 属性</h3>
    <div id="propsContent"><p class="empty">选中元素以编辑</p></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// MAP EDITOR - Layer-based with tab switching
// ============================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;
let cw = 0, ch = 0;

// ── DATA ──
// tabs: { id -> { name, layers: [...] } }
let tabs = {};
let activeTab = 'courtyard';
let activeFloor = '1F';    // current floor
let selectedLayerId = null;
let selectedEl = null;
let dragTarget = null;
let dragOx = 0, dragOy = 0;
let elCounter = 0;
let dirty = false;

function uid() { return 'e' + (++elCounter); }

// ── Tab switching ──
function getTabData() { return tabs[activeTab]; }
function getTabLayers() { return getTabData().layers; }

// ── Default layouts ──
function createDefaultData() {
  tabs = {
    courtyard: {
      name: '合作社大院',
      floors: ['1F'],
      layers: [
        // -- 1F layers --
        { id:'l1', name:'1F·建筑轮廓', floor:'1F', visible:true, elements:[
          // 坐北朝南三合院：北面平房3层，西面瓦房3层，东面戏台1层，南面围墙+双门
          { id:uid(), type:'rect', x:300, y:100, w:300, h:60, label:'北·三层平房', color:'#e8d5c0', note:'3层' },
          { id:uid(), type:'rect', x:200, y:160, w:60, h:250, label:'西·瓦房', color:'#d4c4a8', note:'3层' },
          { id:uid(), type:'rect', x:540, y:200, w:120, h:130, label:'东·戏台', color:'#e0d8c8', note:'1层' },
          { id:uid(), type:'rect', x:260, y:390, w:280, h:10, label:'南·围墙', color:'#c8c0b0', note:'' },
          { id:uid(), type:'rect', x:340, y:390, w:30, h:30, label:'大门', color:'#8b7355', note:'西门' },
          { id:uid(), type:'rect', x:430, y:390, w:30, h:30, label:'大门', color:'#8b7355', note:'东门' },
        ]},
        { id:'l2', name:'1F·标注', floor:'1F', visible:true, elements:[
          { id:uid(), type:'text', x:420, y:115, text:'平房 3F', size:12, color:'#6b5a3e' },
          { id:uid(), type:'text', x:210, y:280, text:'瓦房 3F', size:12, color:'#6b5a3e' },
          { id:uid(), type:'text', x:570, y:260, text:'戏台 1F', size:12, color:'#6b5a3e' },
          { id:uid(), type:'text', x:370, y:370, text:'广场', size:14, color:'#8b7355' },
          { id:uid(), type:'emoji', x:280, y:420, emoji:'🌱', size:24 },
          { id:uid(), type:'text', x:300, y:425, text:'菜地', size:11, color:'#5d9442' },
        ]},
        { id:'l3', name:'1F·道路', floor:'1F', visible:true, elements:[
          { id:uid(), type:'line', x1:400, y1:400, x2:400, y2:500, color:'#c8b898', width:3 },
        ]},
      ]
    },
    sushe: {
      name: '素社',
      floors: ['1F', '2F'],
      layers: [
        { id:'l1', name:'1F·建筑轮廓', floor:'1F', visible:true, elements:[
          // Two connected courtyards (民宿改造)
          { id:uid(), type:'rect', x:200, y:150, w:200, h:160, label:'东合院', color:'#e8d5c0', note:'住宿区' },
          { id:uid(), type:'rect', x:400, y:150, w:200, h:160, label:'西合院', color:'#e0d0b8', note:'创作区' },
        ]},
        { id:'l2', name:'1F·房间', floor:'1F', visible:true, elements:[
          { id:uid(), type:'rect', x:210, y:160, w:80, h:60, label:'101室', color:'#f0e8d8', note:'朝林' },
          { id:uid(), type:'rect', x:300, y:160, w:80, h:60, label:'102室', color:'#f0e8d8', note:'' },
          { id:uid(), type:'rect', x:210, y:230, w:170, h:60, label:'公共区', color:'#e8e0d0', note:'' },
          { id:uid(), type:'rect', x:410, y:160, w:80, h:60, label:'画室', color:'#f0e8d8', note:'若曦' },
          { id:uid(), type:'rect', x:500, y:160, w:80, h:60, label:'展览室', color:'#f0e8d8', note:'' },
        ]},
        { id:'l3', name:'1F·标注', floor:'1F', visible:true, elements:[
          { id:uid(), type:'text', x:270, y:130, text:'🏠 素社', size:16, color:'#4a3a28' },
        ]},
        { id:'l4', name:'2F·房间', floor:'2F', visible:true, elements:[
          { id:uid(), type:'rect', x:210, y:160, w:80, h:60, label:'201室', color:'#f0e8d8' },
          { id:uid(), type:'rect', x:300, y:160, w:80, h:60, label:'202室', color:'#f0e8d8' },
          { id:uid(), type:'rect', x:410, y:160, w:170, h:60, label:'大画室', color:'#e8e0d0' },
        ]},
      ]
    }
  };
  dirty = false;
}

// ============================================================
// RENDERING
// ============================================================
function resizeCanvas() {
  const wrap = document.getElementById('canvasWrap');
  cw = wrap.clientWidth; ch = wrap.clientHeight;
  canvas.width = cw * dpr; canvas.height = ch * dpr;
  canvas.style.width = cw + 'px'; canvas.style.height = ch + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  render();
}

function render() {
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, cw, ch);

  // Grid
  ctx.strokeStyle = 'rgba(0,0,0,.05)'; ctx.lineWidth = 0.5;
  for (let x = 0; x < cw; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ch); ctx.stroke(); }
  for (let y = 0; y < ch; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cw, y); ctx.stroke(); }

  const layers = getTabLayers();
  let total = 0;
  layers.forEach(layer => {
    if (!layer.visible) return;
    // Filter by floor
    const els = activeFloor ? layer.elements.filter(e => !e.floor || e.floor === activeFloor) : layer.elements;
    els.forEach(el => { drawElement(el); total++; });
  });

  // Selected highlight
  if (selectedEl) {
    ctx.strokeStyle = '#ff6b35'; ctx.lineWidth = 2; ctx.setLineDash([4, 3]);
    if (selectedEl.type === 'rect') {
      ctx.strokeRect(selectedEl.x-2, selectedEl.y-2, selectedEl.w+4, selectedEl.h+4);
    } else if (selectedEl.type === 'emoji' || selectedEl.type === 'text') {
      const s = selectedEl.size || 30;
      ctx.strokeRect(selectedEl.x - s/2 - 2, selectedEl.y - s/2 - 2, s+4, s+4);
    } else if (selectedEl.type === 'line') {
      ctx.strokeRect(
        Math.min(selectedEl.x1, selectedEl.x2) - 5, Math.min(selectedEl.y1, selectedEl.y2) - 5,
        Math.abs(selectedEl.x2 - selectedEl.x1) + 10, Math.abs(selectedEl.y2 - selectedEl.y1) + 10
      );
    }
    ctx.setLineDash([]);
  }

  ctx.restore();
}

function drawElement(el) {
  ctx.save();
  switch (el.type) {
    case 'rect':
      ctx.fillStyle = el.color || '#e8e0d0';
      ctx.fillRect(el.x, el.y, el.w, el.h);
      ctx.strokeStyle = 'rgba(0,0,0,.3)'; ctx.lineWidth = 1.5;
      ctx.strokeRect(el.x, el.y, el.w, el.h);
      if (el.label) {
        ctx.fillStyle = '#3d3629';
        ctx.font = `bold ${Math.max(10, Math.min(14, el.w/5))}px var(--font)`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(el.label, el.x + el.w/2, el.y + el.h/2);
      }
      break;
    case 'line':
      ctx.strokeStyle = el.color || '#999'; ctx.lineWidth = el.width || 2; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(el.x1, el.y1); ctx.lineTo(el.x2, el.y2); ctx.stroke();
      break;
    case 'emoji':
      ctx.font = `${el.size || 30}px var(--font)`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(el.emoji || '📍', el.x, el.y);
      break;
    case 'text':
      ctx.fillStyle = el.color || '#333';
      ctx.font = `${el.size || 13}px var(--font)`;
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillText(el.text || '', el.x, el.y);
      break;
  }
  ctx.restore();
}

// ============================================================
// HIT TESTING
// ============================================================
function hitTest(mx, my) {
  const layers = getTabLayers();
  for (let i = layers.length - 1; i >= 0; i--) {
    if (!layers[i].visible) continue;
    const els = activeFloor ? layers[i].elements.filter(e => !e.floor || e.floor === activeFloor) : layers[i].elements;
    for (let j = els.length - 1; j >= 0; j--) {
      const el = els[j];
      if (el.type === 'rect') {
        if (mx >= el.x && mx <= el.x+el.w && my >= el.y && my <= el.y+el.h)
          return { el, layer: layers[i] };
      } else if (el.type === 'emoji' || el.type === 'text') {
        const s = (el.size || 30) / 2;
        if (Math.abs(mx - el.x) < s && Math.abs(my - el.y) < s)
          return { el, layer: layers[i] };
      } else if (el.type === 'line') {
        if (distToSeg(mx, my, el.x1, el.y1, el.x2, el.y2) < 8)
          return { el, layer: layers[i] };
      }
    }
  }
  return null;
}
function distToSeg(px, py, x1, y1, x2, y2) {
  const dx = x2-x1, dy = y2-y1, ls = dx*dx+dy*dy;
  if (ls === 0) return Math.hypot(px-x1, py-y1);
  let t = ((px-x1)*dx + (py-y1)*dy) / ls;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1+t*dx), py - (y1+t*dy));
}

// ============================================================
// MOUSE EVENTS
// ============================================================
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) * (cw / r.width), y: (e.clientY - r.top) * (ch / r.height) };
}

canvas.addEventListener('mousedown', e => {
  if (e.button === 2) { e.preventDefault(); return; }
  if (e.button !== 0) return;
  const p = getPos(e);
  const hit = hitTest(p.x, p.y);
  if (hit) {
    selectedEl = hit.el;
    selectedLayerId = hit.layer.id;
    showProps(selectedEl);
    dragTarget = selectedEl;
    if (selectedEl.type === 'rect') { dragOx = p.x - selectedEl.x; dragOy = p.y - selectedEl.y; }
    else if (selectedEl.type === 'emoji' || selectedEl.type === 'text') { dragOx = p.x - selectedEl.x; dragOy = p.y - selectedEl.y; }
    else if (selectedEl.type === 'line') { dragOx = p.x - (selectedEl.x1+selectedEl.x2)/2; dragOy = p.y - (selectedEl.y1+selectedEl.y2)/2; }
    render(); updateLayerList();
  } else {
    selectedEl = null; selectedLayerId = null;
    document.getElementById('propsContent').innerHTML = '<p class="empty">选中元素以编辑</p>';
    render(); updateLayerList();
  }
});

canvas.addEventListener('mousemove', e => {
  if (!dragTarget) return;
  const p = getPos(e);
  if (dragTarget.type === 'rect') { dragTarget.x = p.x - dragOx; dragTarget.y = p.y - dragOy; }
  else if (dragTarget.type === 'emoji' || dragTarget.type === 'text') { dragTarget.x = p.x - dragOx; dragTarget.y = p.y - dragOy; }
  else if (dragTarget.type === 'line') {
    const dx = p.x - dragOx - (dragTarget.x1+dragTarget.x2)/2;
    const dy = p.y - dragOy - (dragTarget.y1+dragTarget.y2)/2;
    dragTarget.x1 += dx; dragTarget.x2 += dx; dragTarget.y1 += dy; dragTarget.y2 += dy;
    dragOx = p.x - (dragTarget.x1+dragTarget.x2)/2; dragOy = p.y - (dragTarget.y1+dragTarget.y2)/2;
  }
  dirty = true;
  render();
});

canvas.addEventListener('mouseup', () => { dragTarget = null; });
canvas.addEventListener('mouseleave', () => { dragTarget = null; });

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const p = getPos(e);
  const hit = hitTest(p.x, p.y);
  if (hit) {
    const idx = hit.layer.elements.indexOf(hit.el);
    if (idx !== -1) { hit.layer.elements.splice(idx, 1); dirty = true; }
    if (selectedEl === hit.el) { selectedEl = null; document.getElementById('propsContent').innerHTML = '<p class="empty">选中元素以编辑</p>'; }
    render(); updateLayerList();
  }
});

// ============================================================
// PROPERTIES PANEL
// ============================================================
function showProps(el) {
  const pc = document.getElementById('propsContent');
  const fields = {
    rect:  [['x','number'],['y','number'],['w','宽度','number'],['h','高度','number'],['label','标签'],['color','颜色','color'],['note','备注']],
    line:  [['x1','number'],['y1','number'],['x2','number'],['y2','number'],['color','颜色','color'],['width','线宽','number']],
    emoji: [['x','number'],['y','number'],['emoji','图标'],['size','大小','number']],
    text:  [['x','number'],['y','number'],['text','文字'],['size','大小','number'],['color','颜色','color']],
  };
  const fl = fields[el.type] || [];
  pc.innerHTML = fl.map(([k, label, type]) => {
    const lb = label || k;
    if (type === 'color') return `<label>${lb}</label><input type="color" value="${el[k]||'#000'}" data-key="${k}">`;
    return `<label>${lb}</label><input type="${type||'text'}" value="${el[k]!==undefined?el[k]:''}" data-key="${k}">`;
  }).join('') + `<button class="btn warn" style="margin-top:8px;width:100%" id="delElBtn">🗑️ 删除元素</button>`;

  pc.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', () => {
      let v = inp.value;
      if (inp.type === 'number') v = parseFloat(v) || 0;
      el[inp.dataset.key] = v;
      dirty = true; render();
    });
  });
  pc.querySelector('#delElBtn')?.addEventListener('click', () => {
    const layers = getTabLayers();
    for (const l of layers) { const i = l.elements.indexOf(el); if (i !== -1) { l.elements.splice(i,1); break; } }
    selectedEl = null; pc.innerHTML = '<p class="empty">选中元素以编辑</p>';
    dirty = true; render(); updateLayerList();
  });
}

// ============================================================
// LAYER LIST
// ============================================================
function updateLayerList() {
  const ll = document.getElementById('layerList');
  const layers = getTabLayers();
  ll.innerHTML = layers.filter(l => !activeFloor || l.floor === activeFloor || !l.floor).map(l => `
    <div class="layer-item ${l.id === selectedLayerId ? 'sel' : ''}" data-lid="${l.id}">
      <input type="checkbox" ${l.visible?'checked':''} data-lid="${l.id}">
      <span class="layer-name">${l.name}</span>
      <span class="del-btn" data-del="${l.id}">✕</span>
    </div>
  `).join('');

  ll.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      const l = layers.find(x => x.id === cb.dataset.lid);
      if (l) { l.visible = cb.checked; render(); }
    });
  });
  ll.querySelectorAll('.layer-item').forEach(div => {
    div.addEventListener('click', e => {
      if (e.target.tagName === 'INPUT' || e.target.classList.contains('del-btn')) return;
      selectedLayerId = div.dataset.lid;
      updateLayerList();
    });
  });
  ll.querySelectorAll('.del-btn').forEach(b => {
    b.addEventListener('click', e => {
      e.stopPropagation();
      const layers = getTabLayers();
      if (layers.length <= 1) return;
      const idx = layers.findIndex(l => l.id === b.dataset.del);
      if (idx !== -1) { layers.splice(idx, 1); dirty = true; }
      if (selectedLayerId === b.dataset.del) selectedLayerId = layers[0]?.id;
      render(); updateLayerList();
    });
  });
}

// ============================================================
// FLOOR BUTTONS
// ============================================================
function updateFloorBtns() {
  const td = getTabData();
  const fb = document.getElementById('floorBtns');
  fb.innerHTML = td.floors.map(f =>
    `<button class="floor-btn ${f === activeFloor ? 'active' : ''}" data-floor="${f}">${f}</button>`
  ).join('');
  fb.querySelectorAll('.floor-btn').forEach(b => {
    b.addEventListener('click', () => {
      activeFloor = b.dataset.floor;
      updateFloorBtns();
      updateLayerList();
      render();
    });
  });
}

// ============================================================
// TAB SWITCHING
// ============================================================
function switchTab(tabId) {
  activeTab = tabId;
  document.querySelectorAll('.tab-card').forEach(t => t.classList.toggle('active', t.dataset.tab === tabId));
  activeFloor = getTabData().floors[0];
  selectedLayerId = getTabLayers()[0]?.id;
  selectedEl = null;
  document.getElementById('propsContent').innerHTML = '<p class="empty">选中元素以编辑</p>';
  updateFloorBtns();
  updateLayerList();
  render();
}

document.getElementById('tabBar').addEventListener('click', e => {
  const tab = e.target.closest('.tab-card');
  if (tab) switchTab(tab.dataset.tab);
});

// ============================================================
// ADD ELEMENTS
// ============================================================
function getActiveLayer() {
  const layers = getTabLayers();
  let l = layers.find(x => x.id === selectedLayerId);
  if (!l) l = layers.find(x => !activeFloor || x.floor === activeFloor || !x.floor);
  if (!l) l = layers[0];
  return l;
}

function addElement(type, defaults) {
  const layer = getActiveLayer();
  const el = { id: uid(), type, ...defaults };
  if (!el.x && !el.y) { el.x = cw/2 + (Math.random()-0.5)*100; el.y = ch/2 + (Math.random()-0.5)*100; }
  if (activeFloor && !el.floor) el.floor = activeFloor;
  layer.elements.push(el);
  selectedEl = el; selectedLayerId = layer.id;
  showProps(el); dirty = true; render(); updateLayerList();
}

document.getElementById('addRectBtn').addEventListener('click', () => addElement('rect', { w:80, h:60, label:'建筑', color:'#e8d5c0' }));
document.getElementById('addLineBtn').addEventListener('click', () => { const cx=cw/2,cy=ch/2; addElement('line', { x1:cx-40,y1:cy,x2:cx+40,y2:cy,color:'#999',width:2 }); });
document.getElementById('addEmojiBtn').addEventListener('click', () => addElement('emoji', { emoji:'📍', size:28 }));
document.getElementById('addTextBtn').addEventListener('click', () => addElement('text', { text:'标注', size:13, color:'#333' }));

document.getElementById('addLayerBtn').addEventListener('click', () => {
  const layers = getTabLayers();
  const nl = { id:'l'+Date.now(), name:'新图层', floor:activeFloor, visible:true, elements:[] };
  layers.push(nl); selectedLayerId = nl.id; dirty = true;
  updateLayerList(); render();
});

// ============================================================
// SAVE / LOAD
// ============================================================
function saveData() {
  try {
    localStorage.setItem('nantang_map', JSON.stringify(tabs));
    dirty = false; showToast('💾 已保存');
  } catch(e) { showToast('⚠️ 保存失败'); }
}
function loadData() {
  try {
    const raw = localStorage.getItem('nantang_map');
    if (raw) { tabs = JSON.parse(raw); dirty = false; return true; }
  } catch(e) {}
  return false;
}
document.getElementById('saveBtn').addEventListener('click', saveData);
document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(tabs, null, 2)], { type:'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = '南塘地图.json'; a.click();
  showToast('📋 已导出');
});
document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.courtyard && d.sushe) { tabs = d; dirty = false; switchTab(activeTab); showToast('📥 已导入'); }
      else showToast('⚠️ 格式错误');
    } catch(err) { showToast('⚠️ 解析失败'); }
  };
  r.readAsText(f); e.target.value = '';
});

// ============================================================
// KEYBOARD
// ============================================================
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveData(); return; }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedEl) {
      const layers = getTabLayers();
      for (const l of layers) { const i = l.elements.indexOf(selectedEl); if (i!==-1) { l.elements.splice(i,1); break; } }
      selectedEl = null; document.getElementById('propsContent').innerHTML = '<p class="empty">选中元素以编辑</p>';
      dirty = true; render(); updateLayerList();
    }
  }
  if (e.key === 'Escape') { selectedEl = null; render(); updateLayerList(); document.getElementById('propsContent').innerHTML = '<p class="empty">选中元素以编辑</p>'; }
});

// ============================================================
// HELPERS
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid); t._tid = setTimeout(() => t.classList.remove('show'), 2000);
}

// ============================================================
// INIT
// ============================================================
function init() {
  if (!loadData()) createDefaultData();
  activeTab = 'courtyard'; activeFloor = '1F';
  document.querySelector('.tab-card[data-tab="courtyard"]')?.classList.add('active');
  switchTab('courtyard');
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  showToast('🗺️ 就绪 · 拖拽移动 · 右键删除 · 点击编辑');
}
init();
</script>
</body>
</html>
