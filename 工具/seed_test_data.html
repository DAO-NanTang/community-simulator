<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>监察面板 · 测试数据注入</title>
<style>
  body { font-family: system-ui; max-width: 700px; margin: 60px auto; padding: 20px; line-height: 1.8; }
  h1 { color: #5a3e28; } .ok { color: green; font-weight: bold; }
  pre { background: #f5f5f5; padding: 12px; border-radius: 6px; font-size: .82rem; overflow-x: auto; }
  button { padding: 12px 32px; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; margin: 8px; }
  .inject { background: #5a8a3c; color: #fff; }
  .open { background: #3a6a9c; color: #fff; }
  .info { color: #666; font-size: .85rem; }
</style></head>
<body>

<p class="info">模拟场景：6 位冒险者，10 个任务，2 项待审核，3 项逾期，NT 池数据齐全。</p>
<button class="inject" onclick="inject()">💉 注入测试数据</button>
<button class="open" onclick="openDash()">📊 打开 Dashboard</button>
<pre id="log"></pre>

    { name: '用户访谈', type: '支线', category: '宣传', assignee: '陈若雨', points: 20, deadline: '2026-07-15', status: '进行中', source: '测试数据', claimants: [

    { name: '编写文档', type: '支线', category: '管理', assignee: '墨染', points: 25, deadline: '2026-07-12', status: '进行中', source: '测试数据', claimants: [

    '陈若雨': { name: '陈若雨', role: 'adventurer', gender: '女' },
    '墨染':   { name: '墨染',   role: 'adventurer', gender: '男' },
    '念儿':   { name: '念儿',   role: 'adventurer', gender: '女' },
    '小红':   { name: '小红',   role: 'adventurer', gender: '女' },

function openDash() {
  window.open('dashboard.html', '_blank');
}
</script>
</body>
</html>
