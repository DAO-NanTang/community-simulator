<!DOCTYPE html>

<style>

  pre { background: #f5f5f5; padding: 12px; border-radius: 6px; font-size: .82rem; overflow-x: auto; }
  button { padding: 12px 32px; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; margin: 8px; }
  .inject { background: #5a8a3c; color: #fff; }
