<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图标预览 —— Phosphor Icons</title>
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  :root { --bg: #1a1510; --card: #252018; --text: #e0d5c0; --muted: #8a7a60; --accent: #c8a040; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
  h1 { text-align: center; margin-bottom: 32px; color: var(--accent); font-size: 1.5rem; }
  h2 { color: var(--accent); margin: 32px 0 16px; border-bottom: 1px solid #333; padding-bottom: 8px; font-size: 1.1rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
  .icon-card { background: var(--card); border-radius: 10px; padding: 16px 8px; text-align: center; transition: .15s; border: 1px solid transparent; }
  .icon-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .icon-card i { font-size: 2rem; display: block; margin-bottom: 8px; }
  .icon-card .name { font-size: .7rem; color: var(--muted); word-break: break-all; }
  .icon-card .label { font-size: .75rem; font-weight: 600; margin-bottom: 4px; }

  /* Duotone specific */
  .ph-duotone { --ph-duotone-color: currentColor; }

  /* Color coding */
  .c-admin i { color: #c8a040; }     /* gold */
  .c-builder i { color: #5a8a3c; }    /* green */
  .c-adventurer i { color: #5b8cb8; } /* blue */
  .c-npc i { color: #8b7355; }        /* brown */
  .c-visitor i { color: #9b9078; }    /* grey */
  .c-action i { color: #d4b896; }     /* warm */
  .c-status i { color: #a0b890; }     /* muted green */
  .c-deco i { color: #c8a040; }       /* gold */

  .note { font-size: .75rem; color: var(--muted); margin: 6px 0 20px; }
  .switch-row { display: flex; gap: 12px; margin: 16px 0; flex-wrap: wrap; }
  .switch-row button { padding: 8px 16px; border: 1px solid #555; border-radius: 6px; background: var(--card); color: var(--text); cursor: pointer; font-size: .85rem; }
  .switch-row button.active { background: var(--accent); color: #1a1510; border-color: var(--accent); }
</style>
</head>
<body>

<h1>🎨 Phosphor Icons 预览</h1>

<p class="note" style="text-align:center">悬停卡片看放大效果 · 共 47 个图标</p>

<div class="switch-row" style="justify-content:center">
  <button onclick="setWeight('regular')" class="active" id="btn-regular">Regular（常规）</button>
  <button onclick="setWeight('fill')" id="btn-fill">Fill（实心）</button>
  <button onclick="setWeight('duotone')" id="btn-duotone">Duotone（双色调）</button>
  <button onclick="setWeight('bold')" id="btn-bold">Bold（加粗）</button>
</div>

<!-- 第1类：身份/角色 -->
<h2>一、身份/角色图标（5个）</h2>
<div class="grid" id="grid-role"></div>

<!-- 第2类：Tab 导航图标 -->
<h2>二、Tab 导航图标（11个）</h2>
<div class="grid" id="grid-tab"></div>

<!-- 第3类：操作/动作图标 -->
<h2>三、操作/动作图标（12个）</h2>
<div class="grid" id="grid-action"></div>

<!-- 第4类：工具栏/系统图标 -->
<h2>四、工具栏/系统图标（6个）</h2>
<div class="grid" id="grid-tool"></div>

<!-- 第5类：任务状态图标 -->
<h2>五、任务状态图标（8个）</h2>
<div class="grid" id="grid-status"></div>

<!-- 第6类：装饰/氛围图标 -->
<h2>六、装饰/氛围图标（5个）</h2>
<div class="grid" id="grid-deco"></div>

<script>
const icons = {
  role: [
    { name:'crown',label:'管理员',cls:'c-admin' },
    { name:'hammer',label:'共建者',cls:'c-builder' },
    { name:'sword',label:'冒险者',cls:'c-adventurer' },
    { name:'storefront',label:'南塘NPC',cls:'c-npc' },
    { name:'campfire',label:'游客',cls:'c-visitor' },
  ],
  tab: [
    { name:'planet',label:'创世终端' },
    { name:'identification-card',label:'成员档案' },
    { name:'buildings',label:'猎人公会' },
    { name:'target',label:'NT管理' },
    { name:'calendar',label:'世界时间线' },
    { name:'vault',label:'资源金库' },
    { name:'scroll',label:'通关结算' },
    { name:'signpost',label:'任务公告栏' },
    { name:'user-circle',label:'我的资料' },
    { name:'trophy',label:'排行榜' },
    { name:'compass',label:'冒险任务(备用)' },
  ],
  action: [
    { name:'plus-circle',label:'新增' },
    { name:'pencil',label:'编辑' },
    { name:'floppy-disk',label:'保存' },
    { name:'trash',label:'删除' },
    { name:'hand-fist',label:'领取委托',cls:'c-action' },
    { name:'check-circle',label:'提交完成' },
    { name:'flag-banner',label:'放弃' },
    { name:'check-fat',label:'确认通过' },
    { name:'x-circle',label:'退回修改' },
    { name:'key',label:'触发隐藏' },
    { name:'plus-square',label:'发布任务' },
    { name:'sign-out',label:'退出' },
  ],
  tool: [
    { name:'gear',label:'工具菜单' },
    { name:'folder-open',label:'加载数据' },
    { name:'download',label:'导出数据' },
    { name:'keyhole',label:'邀请码' },
    { name:'paint-brush',label:'换头像' },
    { name:'arrow-left',label:'返回' },
  ],
  status: [
    { name:'circle',label:'可领取',cls:'c-status' },
    { name:'check-circle',label:'已领取' },
    { name:'circle-dashed',label:'进行中',cls:'c-status' },
    { name:'hourglass',label:'审核中',cls:'c-status' },
    { name:'check-circle',label:'已完成',note:'(Fill)' },
    { name:'arrow-u-up-left',label:'已退回' },
    { name:'star',label:'主线标记',note:'(Fill)' },
    { name:'compass',label:'支线标记' },
  ],
  deco: [
    { name:'coin',label:'NT货币',cls:'c-deco' },
    { name:'medal',label:'成就勋章',cls:'c-deco' },
    { name:'ghost',label:'空状态',cls:'c-deco' },
    { name:'spinner',label:'加载中',cls:'c-deco' },
    { name:'megaphone',label:'公告通知',cls:'c-deco' },
  ],
};

let currentWeight = 'regular';

function setWeight(w) {
  currentWeight = w;
  document.querySelectorAll('.switch-row button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + w).classList.add('active');
  renderAll();
}

function renderGroup(id, items) {
  const grid = document.getElementById(id);
  grid.innerHTML = items.map(item => {
    const weight = item.note && item.note.includes('Fill') ? 'fill' : currentWeight;
    const prefix = weight === 'fill' ? 'ph-fill' : weight === 'duotone' ? 'ph-duotone' : weight === 'bold' ? 'ph-bold' : 'ph';
    return `<div class="icon-card ${item.cls||''}">
      <i class="${prefix} ph-${item.name}"></i>
      <div class="label">${item.label}</div>
      <div class="name">ph-${item.name}</div>
      ${item.note ? `<div class="name" style="color:var(--accent)">${item.note}</div>` : ''}
    </div>`;
  }).join('');
}

function renderAll() {
  renderGroup('grid-role', icons.role);
  renderGroup('grid-tab', icons.tab);
  renderGroup('grid-action', icons.action);
  renderGroup('grid-tool', icons.tool);
  renderGroup('grid-status', icons.status);
  renderGroup('grid-deco', icons.deco);
}

renderAll();
</script>
</body>
</html>
